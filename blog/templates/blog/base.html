<!-- blog/templates/blog/base.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}MonBlog{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .badge-categorie { font-size: .75em; padding: 4px 10px; border-radius: 12px; }
        .card-article:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-2px); transition: all .2s; }
    </style>
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'blog:accueil' %}">
            MonBlog
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:article_liste' %}">Articles</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:categorie_liste' %}">Categories</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'blog:auteur_liste' %}">Auteurs</a></li>
            </ul>
            <div class="d-flex gap-2">
                {% if user.is_authenticated %}
                    <a href="{% url 'blog:article_creer' %}" class="btn btn-primary btn-sm">Ecrire</a>
                    <a href="{% url 'blog:auteur_modifier' %}" class="btn btn-outline-light btn-sm">{{ user.username }}</a>
                    <form action="{% url 'blog:logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">Déconnexion</button>
                    </form>

                {% else %}
                    <a href="{% url 'blog:login' %}" class="btn btn-outline-light btn-sm">Connexion</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<!-- MESSAGES -->
<div class="container">
    {% for m in messages %}
    <div class="alert alert-{{ m.tags }} alert-dismissible fade show">
        {{ m }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    {% block contenu %}{% endblock %}
</div>

<footer class="bg-dark text-light text-center py-3 mt-5">
    <small>MonBlog - Fait avec Django</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
