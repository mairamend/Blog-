<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmer suppression</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
   <div class="max-w-md mx-auto mt-10">
    <div class="bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100">
        <div class="bg-red-600 px-6 py-4 text-center">
            <i class="fas fa-exclamation-triangle text-white text-3xl mb-2"></i>
            <h1 class="text-xl font-bold text-white">Confirmation de suppression</h1>
        </div>

        <div class="p-8 text-center">
            <p class="text-gray-600 mb-6">
                Êtes-vous sûr de vouloir supprimer l' article 
                <span class="font-bold text-gray-900">{{ article.titre}}</span> ? 
                Cette action est irréversible.
            </p>

            <form method="post" class="flex justify-center space-x-4">
                {% csrf_token %}
                <a href="{{article.get_absolute_url  }}" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium">
                    Annuler
                </a>
                <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 shadow-lg shadow-red-200 transition font-bold">
                    Supprimer définitivement
                </button>
            </form>
        </div>
    </div>
</div> 
</body>
</html>
